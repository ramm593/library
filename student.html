            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;

            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h2 {

            align-items: center;
            gap: 10px;
        }

        .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            background: rgba(255,255,255,0.2);

        }

        .container {

            margin: 30px auto;
            padding: 0 20px;
        }

            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
            position: relative;
            overflow: hidden;
        }

            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #667eea20, #764ba220);
            border-radius: 50%;
        }

        .profile-avatar {

            height: 100px;

            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5em;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .student-info h3 {
            color: #2c3e50;
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .student-info p {
            color: #718096;
            margin: 5px 0;
        }

            margin-left: auto;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            background: #f7fafc;
            padding: 20px;
            border-radius: 15px;
        }

        .reg-input input {
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            width: 250px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .reg-input input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);

        }

        .reg-input button {

            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .reg-input button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.3);
        }

            right: 20px;

            background: white;
            border-radius: 10px;

            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;

            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.success {
            border-left: 4px solid #48bb78;
        }

        .toast.error {
            border-left: 4px solid #f56565;
        }

        .toast.info {
            border-left: 4px solid #4299e1;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1001;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .modal p {
            color: #718096;
            margin-bottom: 25px;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .modal-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .modal-btn.confirm {
            background: #48bb78;
            color: white;
        }

        .modal-btn.cancel {
            background: #cbd5e0;
            color: #4a5568;
        }

        .modal-btn.confirm:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        .modal-btn.cancel:hover {
            background: #a0aec0;
        }

        // Load student selector
        function loadStudentSelector() {
            const selector = document.getElementById('studentSelector');
            selector.innerHTML = '';
            
            students.forEach((student, index) => {
                const option = document.createElement('option');
                option.value = student.regNumber;
                option.textContent = `${student.name} - ${student.regNumber} (Form ${student.form})`;
                if (index === 0) option.selected = true;
                selector.appendChild(option);
            });
            
            document.getElementById('studentCount').textContent = `${students.length} Students`;

                document.getElementById('regInput').value = student.regNumber;
                document.getElementById('studentAvatar').textContent = student.avatar;
                
                // Update student info paragraph
                const infoPara = document.querySelector('.student-info p');
                infoPara.innerHTML = `🏫 Form ${student.form} • Mwenge Secondary`;
                
                // Load requests for this student
                myRequests = allRequests.filter(r => r.regNumber === student.regNumber);
                loadRequests();
                
                showToast(`✓ Switched to ${student.name}`, 'success');
            }
        }

        // Load books
        function loadBooks() {
            const booksGrid = document.getElementById('booksGrid');
            booksGrid.innerHTML = '';
            
            books.forEach(book => {
                const bookCard = document.createElement('div');
                bookCard.className = 'book-card';
                bookCard.innerHTML = `
                    <div class="book-cover">${getBookEmoji(book.category)}</div>
                    <div class="book-details">
                        <h3>${book.title}</h3>
                        <p>✍️ ${book.author}</p>
                        <p>📌 ISBN: ${book.isbn}</p>
                        <p>📚 Category: ${book.category}</p>
                        <span class="status ${book.available ? 'available' : 'borrowed'}">
                            ${book.available ? '✓ Available' : '✗ Borrowed'}
                        </span>
                        <button class="request-btn" ${!book.available ? 'disabled' : ''} onclick="openRequestModal(${book.id}, '${book.title}')">
                            ${book.available ? '📥 Request Book' : '❌ Unavailable'}
                        </button>
                    </div>
                `;
                booksGrid.appendChild(bookCard);
            });
        }

        function getBookEmoji(category) {
            const emojis = {
                'Language': '📖',
                'History': '📜',
                'Mathematics': '➗',
                'Science': '🔬',
                'Geography': '🌍',
                'Social Studies': '🏛️'
            };
            return emojis[category] || '📘';
        }

        // Load requests for current student
        function loadRequests() {
            const tbody = document.getElementById('requestsBody');
            tbody.innerHTML = '';
            
            if (myRequests.length === 0) {
                const row = document.createElement('tr');
                row.innerHTML = `<td colspan="4" style="text-align: center; color: #718096;">No requests found for this student</td>`;
                tbody.appendChild(row);
                return;
            }
            
            myRequests.forEach(request => {
                const row = document.createElement('tr');
                const statusClass = request.status === 'pending' ? 'status-pending' : 
                                   request.status === 'approved' ? 'status-approved' : 'status-rejected';
                
                const statusText = request.status === 'pending' ? 'Pending' :
                                  request.status === 'approved' ? 'Approved' : 'Rejected';
                
                row.innerHTML = `
                    <td>${request.bookTitle}</td>
                    <td>${request.date}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    <td>
                        ${request.status === 'pending' ? 
                            '<button onclick="cancelRequest(' + request.id + ')" style="padding:5px 10px; background:#f56565; color:white; border:none; border-radius:5px; cursor:pointer;">✗ Cancel</button>' : 
                            '-'}
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // Modal functionality
        let currentBookId = null;
        let currentBookTitle = '';

        function openRequestModal(bookId, bookTitle) {
            currentBookId = bookId;
            currentBookTitle = bookTitle;
            document.getElementById('modalBookInfo').textContent = `Do you want to request: "${bookTitle}"?`;
            document.getElementById('requestModal').style.display = 'flex';
        }

        document.getElementById('confirmRequest').addEventListener('click', function() {
            const regNumber = document.getElementById('regNumber').textContent;
            
            if (regNumber && regNumber.match(/^S\.\d{4}-\d{4}$/)) {
                // Add request
                const newRequest = {
                    id: allRequests.length + 1,
                    regNumber: regNumber,
                    bookTitle: currentBookTitle,
                    date: new Date().toISOString().split('T')[0],
                    status: 'pending'
                };
                
                allRequests.push(newRequest);
                myRequests.push(newRequest);
                
                // Update book availability
                const bookIndex = books.findIndex(b => b.id === currentBookId);
                if (bookIndex !== -1) {
                    books[bookIndex].available = false;
                }
                
                loadBooks();
                loadRequests();
                document.getElementById('requestModal').style.display = 'none';
                showToast('✓ Your request has been sent!', 'success');
            } else {
                showToast('✗ Please enter a valid Registration Number', 'error');
            }
        });

        document.getElementById('cancelRequest').addEventListener('click', function() {
            document.getElementById('requestModal').style.display = 'none';
        });

        // Close modal when clicking outside
        window.addEventListener('click', function(event) {
            const modal = document.getElementById('requestModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        });

        // Search books
        function searchBooks() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const bookCards = document.querySelectorAll('.book-card');
            
            bookCards.forEach(card => {
                const title = card.querySelector('h3').textContent.toLowerCase();
                const author = card.querySelector('p:first-of-type').textContent.toLowerCase();
                
                if (title.includes(searchTerm) || author.includes(searchTerm)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // Update registration number
        function updateRegNumber() {
            const newReg = document.getElementById('regInput').value.trim();
            
            if (newReg === '') {
                showToast('✗ Please enter registration number', 'error');
                return;
            }
            
            if (!newReg.match(/^S\.\d{4}-\d{4}$/)) {
                showToast('✗ Correct format: S.0000-0000', 'error');
                return;
            }
            
            // Check if student exists
            const student = students.find(s => s.regNumber === newReg);
            if (student) {
                document.getElementById('regNumber').textContent = newReg;
                document.getElementById('studentName').textContent = student.name;
                document.getElementById('studentAvatar').textContent = student.avatar;
                
                // Update selector
                const selector = document.getElementById('studentSelector');
                for (let i = 0; i < selector.options.length; i++) {
                    if (selector.options[i].value === newReg) {
                        selector.selectedIndex = i;
                        break;
                    }
                }
                
                // Load requests for this student
                myRequests = allRequests.filter(r => r.regNumber === newReg);
                loadRequests();
                
                showToast('✓ Student information updated!', 'success');
            } else {
                showToast('✗ Student not found in database', 'error');
            }
        }

        // Cancel request
        function cancelRequest(requestId) {
            if (confirm('Are you sure you want to cancel this request?')) {
                // Remove from allRequests
                allRequests = allRequests.filter(r => r.id !== requestId);
                // Remove from myRequests
                myRequests = myRequests.filter(r => r.id !== requestId);
                
                // Update book availability (find the book and make it available again)
                const cancelledRequest = allRequests.find(r => r.id === requestId);
                if (cancelledRequest) {
                    const book = books.find(b => b.title === cancelledRequest.bookTitle);
                    if (book) {
                        book.available = true;
                    }
                }
                
                loadBooks();
                loadRequests();
                showToast('✓ Request cancelled', 'info');
            }
        }

        // Navigation functions
        function showMyBooks() {
            const borrowedBooks = myRequests.filter(r => r.status === 'approved');
            let message = 'Books you have borrowed:\n';
            borrowedBooks.forEach(b => {
                message += `- ${b.bookTitle}\n`;
            });
            alert(message || 'You have not borrowed any books');
        }

        function showHistory() {
            const allRequests = myRequests.map(r => 
                `${r.bookTitle} - ${r.date} (${r.status})`
            ).join('\n');
            alert('Request history:\n' + (allRequests || 'No history'));
        }

        // Initialize with first student
        function initializeFirstStudent() {
            const firstStudent = students[0];
            document.getElementById('studentName').textContent = firstStudent.name;
            document.getElementById('regNumber').textContent = firstStudent.regNumber;
            document.getElementById('regInput').value = firstStudent.regNumber;
            document.getElementById('studentAvatar').textContent = firstStudent.avatar;
            
            const infoPara = document.querySelector('.student-info p');
            infoPara.innerHTML = `🏫 Form ${firstStudent.form} • Mwenge Secondary`;
            
            myRequests = allRequests.filter(r => r.regNumber === firstStudent.regNumber);
        }

        // Initial load
        loadStudentSelector();
        initializeFirstStudent();
        loadBooks();
        loadRequests();
    </script>
</body>
</html>
